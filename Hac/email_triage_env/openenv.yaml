name: email-triage-env
version: 1.0.0
description: Email triage and customer support environment for RL agents - real task simulation with prioritization, response drafting, and ticket routing
author: OpenEnv Contributor
tags:
  - openenv
  - email-triage
  - customer-support
  - real-world
observation_space:
  type: dict
  properties:
    email_id: int
    from_address: str
    subject: str
    body: str
    urgency_keywords: list
    priority_history: list
action_space:
  type: int
  description: "0=Mark Low Priority, 1=Mark Medium Priority, 2=Mark High Priority, 3=Draft Reply, 4=Escalate, 5=Archive"
reward_range: [0.0, 1.0]
tasks:
  - easy_email_triage
  - medium_response_drafting
  - hard_complex_escalation